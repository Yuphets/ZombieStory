<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scratch Marks - Zombie Survival Tale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Permanent+Marker&family=Schoolbell&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ui/styles.css">
</head>
<body>
  <svg class="texture-defs" aria-hidden="true">
    <filter id="rough-paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="8"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"></feFuncA>
      </feComponentTransfer>
    </filter>
    <filter id="ink-bleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="4"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="1.8"></feDisplacementMap>
    </filter>
  </svg>

  <main id="app" class="sketchbook" aria-live="polite"></main>
  <div id="toast" class="toast" role="status"></div>

  <script type="module" src="engine/main.js"></script>
</body>
</html>
